# .github/workflows/sync.yml
name: Sync Fork

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *' # 每天UTC 16:00(北京时间0:00)同步
jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v1.8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          owner: Dennis114514
          head: main 
          base: main 
          repo: GenshinLore
